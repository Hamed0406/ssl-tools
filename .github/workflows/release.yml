name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ASSET="ssl-tools-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BINARY="ssl-tools${{ matrix.ext }}"
          OUTDIR="dist/${ASSET}"

          mkdir -p "${OUTDIR}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w -X ssl-tools/internal/version.current=${TAG}" \
            -o "${OUTDIR}/${BINARY}" ./cmd/ssl-tools

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && zip -r "${ASSET}.zip" "${ASSET}")
          else
            tar -C dist -czf "dist/${ASSET}.tar.gz" "${ASSET}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}-asset
          path: |
            dist/*.zip
            dist/*.tar.gz

  publish-release:
    needs: build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/sha256sums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/sha256sums.txt
